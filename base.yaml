# ============================================
#   AOSD Prognosis Pipeline Base Config
#   供 extract_feats.py / train_mil_cox.py / infer_case.py 共用
# ============================================

run:
  workdir: "/home/u12518354/jupyterlab/AOSD_RUN_DINOv2"
  seed: 42

data:
  wsi_glob:
    - "/home/u12518354/jupyterlab/WSI/Z1/*.ndpi"
    - "/home/u12518354/jupyterlab/WSI/S3/*.ndpi"
    - "/home/u12518354/jupyterlab/WSI/Z3/*.svs"
    - "/home/u12518354/jupyterlab/WSI/SD/**/*.tif"
    - "/home/u12518354/jupyterlab/WSI/SD/**/*.tiff"
  clinic_xlsx: "/home/u12518354/jupyterlab/clinic/MAD.xlsx"
  id_col: "ID"                # 患者/WSI ID 列名
  status_col: "status"        # 事件列名 (0/1)
  time_col: "time"            # 随访时间列名
  center_col: "CENTER"        # 中心列名
  # 若临床表无表头，可用以下列索引（0-based）作为回退
  status_idx: 0
  time_idx: 1
  center_idx: 2
  id_idx: 3
  train_centers: ["Z1"]       # 训练+内验证中心（实际划分见 train_mil_cox.py）
  external_centers: ["S3", "Z3", "SD"]    # 外部验证中心

#记得要修改，测试
split:
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  stratify_by_event: false

tiling:
  patch_size: 256
  overlap: 0
  read_level: 0         # WSI pyramid level to read (0 = highest resolution; use >0 for downsampled if memory-constrained)
  min_tissue_percent: 0.5
  blur_var_th: 60.0
  max_tiles_per_wsi: 6000
  thumbnail_size: 2048

stain:
  method: "macenko"     # 仅有 macenko / none

encoder:
  # ===== 仅保留一个激活配置，其余注释 =====
  # [ACTIVE] DINOv2-L (本地权重 + config.json)
  kind: "dinov2-large"
  ckpt_root: "/home/u12518354/jupyterlab/CODE/ckpts"
  ckpt_filename: "pytorch_model.bin"
  weights_path: "/home/u12518354/jupyterlab/CODE/ckpts/dinov2/pytorch_model.bin"
  batch_size: 16
  input_size: 224
  embed_dim: 1024         # DINOv2-L CLS dim
  norm_mean: [0.485, 0.456, 0.406]
  norm_std:  [0.229, 0.224, 0.225]
  #
  # [ALT] UNI2-h
  # kind: "uni2-h"
  # weights_path: "/home/u12518354/jupyterlab/CODE/ckpts/uni2-h/pytorch_model.bin"
  # embed_dim: 1536
  #
  # [ALT] Prov-GigaPath
  # kind: "prov-gigapath"
  # weights_path: "/home/u12518354/jupyterlab/CODE/ckpts/prov-gigapath/pytorch_model.bin"
  # embed_dim: 1536
  #
  # [ALT] Virchow2
  # kind: "Virchow2"
  # weights_path: "/home/u12518354/jupyterlab/CODE/ckpts/Virchow2/pytorch_model.bin"
  # embed_dim: 1280

mil:
  arch: "gated_attn"         # gated_attn (recommended) / attn
  hidden: 256
  dropout: 0.25
  bag_size_train: 4000
  bag_strategy: "uniform"     # uniform / random
  epochs: 10
  lr: 1.0e-4
  weight_decay: 1.0e-4
  early_stop: 10
  stability_weight: 1.0e-3    # λ for ||z||^2 regularizer
  cox_l2: 1.0e-4              # L2 on Cox risk head

features:
  pca_dim: 64
  pca_dim_grid: [32, 64, 128]

survival:
  penalizer: 10
